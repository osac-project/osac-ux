version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - staticcheck
    - govet
    - ineffassign
    - unused
    - misspell
    - revive
    - exhaustive
    - noctx
    - bodyclose
  settings:
    revive:
      rules:
        - name: exported
          severity: warning
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/osac/proxy
