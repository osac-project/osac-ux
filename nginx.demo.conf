server {
    listen 8080;
    root /usr/share/nginx/html;

    # SPA routing — all paths under /osac-ux/ fall back to index.html
    location /osac-ux/ {
        try_files $uri $uri/ /osac-ux/index.html;
    }

    # Redirect bare root to the app
    location = / {
        return 301 /osac-ux/;
    }
}
